name: Build ARMSX2 for Switchroot Tegra X1 v4

on:
  workflow_dispatch:
  push:
    branches:
      - switchroot-build

permissions:
  contents: read

jobs:
  build-switchroot:
    name: Switchroot Jammy / Cortex-A57 / ARMv8.0 / 4K
    runs-on: ubuntu-24.04-arm

    # Keep the produced binary compatible with Switchroot Ubuntu 22.04.
    container:
      image: ubuntu:22.04

    env:
      DEBIAN_FRONTEND: noninteractive
      APPIMAGE_EXTRACT_AND_RUN: "1"
      DEPS_DIR: ${{ github.workspace }}/.deps/qt
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "9"
      CCACHE_MAXSIZE: 500M
      FREETYPE_VERSION: "2.14.3"
      ARM_BASELINE_FLAGS: "-march=armv8-a -mtune=cortex-a57 -mno-outline-atomics"

    defaults:
      run:
        shell: bash

    steps:
      - name: Bootstrap Ubuntu 22.04 ARM64 container
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl wget gnupg software-properties-common sudo

          add-apt-repository -y universe
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            > /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo 'deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main' \
            > /etc/apt/sources.list.d/llvm-17.list

          apt-get update
          apt-get install -y --no-install-recommends \
            aria2 autoconf automake binutils build-essential bzip2 ccache \
            clang-17 cmake desktop-file-utils extra-cmake-modules file git gzip \
            libaio-dev libasound2-dev libbz2-dev libcurl4-openssl-dev \
            libdbus-1-dev libdecor-0-dev libdigest-sha-perl libegl-dev \
            libevdev-dev libfontconfig-dev libfreetype-dev libfuse2 \
            libgtk-3-dev libgudev-1.0-dev libharfbuzz-dev libinput-dev \
            libopengl-dev libopus-dev libpcap-dev libpipewire-0.3-dev \
            libpng-dev libpulse-dev libssl-dev libtool libudev-dev libva-dev \
            libvulkan-dev libwayland-dev libx11-dev libx11-xcb-dev \
            libx264-dev libxcb1-dev libxcb-composite0-dev libxcb-cursor-dev \
            libxcb-damage0-dev libxcb-glx0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev libxcb-present-dev \
            libxcb-randr0-dev libxcb-render0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-shm0-dev libxcb-sync-dev \
            libxcb-util-dev libxcb-xfixes0-dev libxcb-xinput-dev \
            libxcb-xkb-dev libxext-dev libxkbcommon-x11-dev libxrandr-dev \
            lld-17 llvm-17 make nasm ninja-build patch patchelf perl \
            pkg-config python3 tar unzip xz-utils zlib1g-dev

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Patch official ARM64 baseline for Tegra X1
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("cmake/BuildParameters.cmake")
          text = path.read_text()
          old = 'add_compile_options("-march=armv8.1-a")'
          new = 'add_compile_options("-march=armv8-a" "-mtune=cortex-a57" "-mno-outline-atomics")'

          count = text.count(old)
          if count != 1:
              raise SystemExit(
                  f"Expected exactly one ARMv8.1 flag, found {count}. "
                  "Upstream changed BuildParameters.cmake; inspect it before building."
              )

          path.write_text(text.replace(old, new))
          PY

          grep -n -A3 -B3 'cortex-a57' cmake/BuildParameters.cmake
          if grep -R --line-number --fixed-strings -- '-march=armv8.1-a' \
              cmake CMakeLists.txt pcsx2 3rdparty; then
            echo "ARMv8.1 flags remain in source. Refusing to build for Tegra X1."
            exit 1
          fi

      - name: Ensure AppImage bundles FreeType and HarfBuzz
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path(".github/workflows/scripts/linux/appimage-qt.sh")
          text = path.read_text()
          required = [
              "libshaderc_shared.so.1",
              "libharfbuzz.so.0",
              "libfreetype.so.6",
          ]

          # Accept declarations with or without `declare -a`, arbitrary spacing,
          # and arrays split across multiple lines. This also succeeds when the
          # required libraries were already committed to the fork.
          pattern = re.compile(
              r"(?ms)^(?P<indent>[ \t]*)(?:declare[ \t]+-a[ \t]+)?"
              r"MANUAL_LIBS[ \t]*=[ \t]*\((?P<body>.*?)\)"
          )
          match = pattern.search(text)
          if not match:
              nearby = "\n".join(
                  line for line in text.splitlines()
                  if "MANUAL_LIBS" in line or "shaderc" in line
              )
              raise SystemExit(
                  "Could not locate the MANUAL_LIBS array in appimage-qt.sh. "
                  f"Relevant lines:\n{nearby or '(none)'}"
              )

          body = match.group("body")
          libs = re.findall(r"['\"]([^'\"]+)['\"]", body)
          for lib in required:
              if lib not in libs:
                  libs.append(lib)

          replacement = (
              f'{match.group("indent")}declare -a MANUAL_LIBS=( '
              + " ".join(f'"{lib}"' for lib in libs)
              + " )"
          )
          text = text[:match.start()] + replacement + text[match.end():]
          path.write_text(text)
          PY

          grep -n -A2 -B2 'MANUAL_LIBS' \
            .github/workflows/scripts/linux/appimage-qt.sh
          grep -q 'libshaderc_shared.so.1' .github/workflows/scripts/linux/appimage-qt.sh
          grep -q 'libharfbuzz.so.0' .github/workflows/scripts/linux/appimage-qt.sh
          grep -q 'libfreetype.so.6' .github/workflows/scripts/linux/appimage-qt.sh

      - name: Cache bundled dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: .deps
          key: switchroot-jammy-arm64-freetype-2.14.3-v4-${{ hashFiles('.github/workflows/scripts/linux/build-dependencies-qt.sh', '.github/workflows/scripts/common/*.patch') }}

      - name: Build modern FreeType on the Jammy baseline
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          mkdir -p "$DEPS_DIR" "$RUNNER_TEMP/freetype-src"
          cd "$RUNNER_TEMP/freetype-src"

          curl --fail --location --retry 5 --retry-all-errors \
            --output "freetype-${FREETYPE_VERSION}.tar.xz" \
            "https://download.savannah.gnu.org/releases/freetype/freetype-${FREETYPE_VERSION}.tar.xz"
          tar -xf "freetype-${FREETYPE_VERSION}.tar.xz"
          cd "freetype-${FREETYPE_VERSION}"

          CC=clang-17 \
          CFLAGS="-O2 -fPIC ${ARM_BASELINE_FLAGS}" \
          ./configure \
            --prefix="$DEPS_DIR" \
            --libdir="$DEPS_DIR/lib" \
            --enable-shared \
            --disable-static \
            --without-harfbuzz

          make -j"$(nproc)"
          make install

          export PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          pkg-config --modversion freetype2

      - name: Build ARMSX2 bundled dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          export PATH="$DEPS_DIR/bin:$PATH"
          export PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig:$DEPS_DIR/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export LD_LIBRARY_PATH="$DEPS_DIR/lib:${LD_LIBRARY_PATH:-}"
          export CC=clang-17
          export CXX=clang++-17
          export CFLAGS="-O2 -pipe ${ARM_BASELINE_FLAGS}"
          export CXXFLAGS="-O2 -pipe ${ARM_BASELINE_FLAGS}"

          BUILD_FFMPEG=1 \
            bash .github/workflows/scripts/linux/build-dependencies-qt.sh "$DEPS_DIR"

      - name: Validate cached or freshly built dependencies
        run: |
          set -euxo pipefail
          export PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig:$DEPS_DIR/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export LD_LIBRARY_PATH="$DEPS_DIR/lib:${LD_LIBRARY_PATH:-}"

          FT_VERSION="$(pkg-config --modversion freetype2)"
          echo "FreeType selected from prefix: $FT_VERSION"
          dpkg --compare-versions "$FT_VERSION" ge 2.12
          pkg-config --variable=libdir freetype2
          find "$DEPS_DIR" -name 'libfreetype.so*' -print

          # The fork manually bundles HarfBuzz. Put the Jammy library in the
          # dependency prefix so the official packaging script can find it.
          HB_PATH="$(ldconfig -p | awk '/libharfbuzz\.so\.0/{print $NF; exit}')"
          test -n "$HB_PATH"
          cp -Lf "$HB_PATH" "$DEPS_DIR/lib/libharfbuzz.so.0"
          file "$DEPS_DIR/lib/libharfbuzz.so.0"

      - name: Download game patches database
        run: |
          set -euxo pipefail
          mkdir -p bin/resources
          aria2c --allow-overwrite=true --auto-file-renaming=false \
            --dir=bin/resources --out=patches.zip \
            https://github.com/isztldav/pcsx2_patches/releases/latest/download/patches.zip

      - name: Configure ARMSX2
        run: |
          set -euxo pipefail
          export PATH="$DEPS_DIR/bin:$PATH"
          export PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig:$DEPS_DIR/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export LD_LIBRARY_PATH="$DEPS_DIR/lib:${LD_LIBRARY_PATH:-}"

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
            -DLTO_PCSX2_CORE=OFF \
            -DCMAKE_PREFIX_PATH="$DEPS_DIR" \
            -DCMAKE_C_FLAGS="$ARM_BASELINE_FLAGS" \
            -DCMAKE_CXX_FLAGS="$ARM_BASELINE_FLAGS" \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="-fuse-ld=lld" \
            -DCMAKE_MODULE_LINKER_FLAGS_INIT="-fuse-ld=lld" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_TESTS=OFF \
            -DENABLE_SETCAP=OFF \
            -DUSE_LINKED_FFMPEG=ON \
            -DUSE_OPENGL=ON \
            -DUSE_VULKAN=ON \
            -DX11_API=ON \
            -DWAYLAND_API=ON \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
            -DHOST_PAGE_SIZE=4096 \
            -DHOST_CACHE_LINE_SIZE=64

      - name: Build ARMSX2
        run: |
          set -euxo pipefail
          export LD_LIBRARY_PATH="$DEPS_DIR/lib:${LD_LIBRARY_PATH:-}"
          cmake --build build --parallel 3

      - name: Check generated binary
        run: |
          set -euxo pipefail
          export LD_LIBRARY_PATH="$DEPS_DIR/lib:${LD_LIBRARY_PATH:-}"

          file build/bin/armsx2-qt
          ldd build/bin/armsx2-qt | tee build/ldd-main.txt
          echo "Build glibc: $(ldd --version | head -n1)"
          echo "FreeType used by pkg-config: $(PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig" pkg-config --modversion freetype2)"

          echo "Highest GLIBC symbol required by the main executable:"
          strings build/bin/armsx2-qt \
            | grep -oE 'GLIBC_[0-9]+(\.[0-9]+)*' \
            | sort -Vu \
            | tail -n1 || true

          echo "Scanning the main executable for ARMv8.1 LSE mnemonics:"
          if llvm-objdump-17 -d build/bin/armsx2-qt \
            | grep -E -m20 '\b(ldadd|ldclr|ldeor|ldset|swp|cas[a-z]*)\b'; then
            echo "Unexpected LSE-looking instructions found."
            exit 1
          fi

      - name: Package AppImage
        env:
          NAME: ARMSX2-switchroot-tegra-x1-arm64
        run: |
          set -euxo pipefail
          export PATH="$DEPS_DIR/bin:$PATH"
          export PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig:$DEPS_DIR/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export LD_LIBRARY_PATH="$DEPS_DIR/lib:${LD_LIBRARY_PATH:-}"

          bash .github/workflows/scripts/linux/appimage-qt.sh \
            "$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/build" \
            "$DEPS_DIR" \
            "$NAME"
          chmod +x "$NAME.AppImage"

      - name: Audit AppImage contents and GPU-driver isolation
        env:
          NAME: ARMSX2-switchroot-tegra-x1-arm64
        run: |
          set -euxo pipefail
          rm -rf squashfs-root
          env -u APPIMAGE_EXTRACT_AND_RUN \
            ./"$NAME.AppImage" --appimage-extract >/dev/null

          echo "Bundled FreeType/HarfBuzz:"
          find squashfs-root -type f,l \
            \( -name 'libfreetype.so*' -o -name 'libharfbuzz.so*' \) -print
          test -n "$(find squashfs-root -name 'libfreetype.so.6*' -print -quit)"
          test -n "$(find squashfs-root -name 'libharfbuzz.so.0*' -print -quit)"

          echo "Graphics loader libraries, if any:"
          find squashfs-root -type f,l \
            \( -name 'libGL.so*' -o -name 'libOpenGL.so*' \
               -o -name 'libGLX.so*' -o -name 'libEGL.so*' \
               -o -name 'libGLES*.so*' -o -name 'libvulkan.so*' \) \
            -print || true

          mapfile -t BAD_GPU_FILES < <(
            find squashfs-root \
              \( -type f -o -type l \) \
              \( -iname 'libnvidia*' -o -iname '*nouveau*dri*.so*' \
                 -o -path '*/vulkan/icd.d/*' -o -path '*/dri/*_dri.so' \) \
              -print
          )

          if (( ${#BAD_GPU_FILES[@]} )); then
            printf 'Vendor GPU files must come from Switchroot, not the runner:\n%s\n' \
              "${BAD_GPU_FILES[*]}"
            exit 1
          fi

          {
            echo "source_commit=$(git rev-parse HEAD)"
            echo "build_os=$(grep PRETTY_NAME /etc/os-release)"
            echo "glibc=$(ldd --version | head -n1)"
            echo "freetype=$(PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig" pkg-config --modversion freetype2)"
            echo "page_size=4096"
            echo "cpu_flags=$ARM_BASELINE_FLAGS"
          } > build-info.txt

      - name: Upload AppImage and build information
        uses: actions/upload-artifact@v4
        with:
          name: ARMSX2-switchroot-tegra-x1-arm64-v4
          path: |
            ARMSX2-switchroot-tegra-x1-arm64.AppImage
            build-info.txt
            build/ldd-main.txt
          if-no-files-found: error
